<p class="font-label text-xs uppercase tracking-[0.2em] text-on-primary-container opacity-80">Precision Engineered Access</p>
</div>

<div class="absolute bottom-0 left-0 w-full h-12 bg-background z-30" style="clip-path: polygon(0 100%, 100% 100%, 100% 0, 50% 100%, 0 0);"></div>
</header>
<!-- Content / Login Form -->
<main class="flex-grow px-8 pt-4 pb-12 flex flex-col max-w-md mx-auto w-full">
<div class="mb-10 text-left">
<h2 class="font-headline font-extrabold text-3xl text-primary tracking-tight mb-2">Prijavi se</h2>
<div class="w-12 h-1 bg-secondary mb-4"></div>
<p class="text-on-surface-variant font-medium">Unesite svoje podatke za pristup dijagnostičkom sustavu.</p>
</div>
<form class="space-y-6">
<!-- Email Input -->
<div class="group">
<label class="block font-label text-[10px] font-bold uppercase tracking-widest text-on-surface-variant mb-2 ml-1">Korisnički E-mail</label>
<div class="relative">
<input class="w-full bg-surface-container-low border-none focus:ring-0 px-4 py-4 text-primary font-semibold placeholder:text-outline-variant/60" placeholder="example@konekt.hr" type="email"/>
<div class="absolute bottom-0 left-0 w-0 h-[2px] bg-secondary transition-all duration-500 group-focus-within:w-full"></div>
</div>
</div>
<!-- Password Input -->
<div class="group">
<div class="flex justify-between items-center mb-2 ml-1">
<label class="block font-label text-[10px] font-bold uppercase tracking-widest text-on-surface-variant">Zaporka</label>
<a class="text-[10px] font-bold uppercase tracking-widest text-secondary hover:text-primary transition-colors" href="#">Zaboravljena?</a>
</div>
<div class="relative">
<input class="w-full bg-surface-container-low border-none focus:ring-0 px-4 py-4 text-primary font-semibold placeholder:text-outline-variant/60" placeholder="••••••••" type="password"/>
<div class="absolute bottom-0 left-0 w-0 h-[2px] bg-secondary transition-all duration-500 group-focus-within:w-full"></div>
</div>
</div>
<!-- Login Button -->
<button class="w-full py-5 bg-secondary text-white font-headline font-bold text-sm uppercase tracking-widest clipped-btn shadow-lg shadow-secondary/20 hover:bg-primary transition-all active:scale-95 duration-150" type="submit">
                Prijavi se
            </button>
</form>
<!-- Divider -->
<div class="relative flex items-center py-10">
<div class="flex-grow border-t border-outline-variant/20"></div>
<span class="flex-shrink mx-4 font-label text-[10px] font-bold uppercase tracking-tighter text-outline-variant">ili nastavi putem</span>
<div class="flex-grow border-t border-outline-variant/20"></div>
</div>
<!-- Google Login -->
<button class="w-full flex items-center justify-center gap-3 py-4 bg-white border border-outline-variant/10 font-bold text-sm tracking-tight text-primary transition-all hover:bg-surface-container-low active:scale-95 duration-150">

<!-- Registration Link -->
<p class="mt-auto pt-10 text-center font-medium text-sm text-on-surface-variant">
            Nemate račun? 
            <a class="text-secondary font-bold hover:underline decoration-2 underline-offset-4" href="#">Registriraj se</a>
</p>
